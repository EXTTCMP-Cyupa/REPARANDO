server:
  port: 8080

spring:
  application:
    name: reparando-backend
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/reparando}
    username: ${SPRING_R2DBC_USERNAME:reparando}
    password: ${SPRING_R2DBC_PASSWORD:reparando}
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/reparando
    user: ${SPRING_R2DBC_USERNAME:reparando}
    password: ${SPRING_R2DBC_PASSWORD:reparando}
    locations: classpath:db/migration

app:
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
    jwt:
      secret: ${JWT_SECRET:replace_this_with_at_least_32_chars_secret}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  business:
    lead-cost: 1.50
    trust-credit-limit: -3.00
    storage-path: uploads

logging:
  level:
    root: INFO
