version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: reparando-postgres
    environment:
      POSTGRES_DB: reparando
      POSTGRES_USER: reparando
      POSTGRES_PASSWORD: reparando
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reparando -d reparando"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
